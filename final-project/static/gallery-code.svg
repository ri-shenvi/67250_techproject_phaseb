  <g fill="none" stroke="#92ad70" stroke-width="2" opacity="0.7">
    <rect x="100" y="80" width="200" height="140" rx="4"/>
    <rect x="340" y="80" width="200" height="140" rx="4"/>
    <rect x="580" y="80" width="120" height="140" rx="4"/>
    <line x1="100" y1="280" x2="700" y2="280"/>
    <line x1="100" y1="320" x2="550" y2="320"/>
    <line x1="100" y1="360" x2="620" y2="360"/>
  </g>
  <rect x="250" y="400" width="300" height="60" rx="8" fill="#1a1a1c" stroke="#4d5c3b"/>
