<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="author" content="Riya Shenvi">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - MonoMuse</title>

    <link rel="stylesheet" href="../static/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;400;700&display=swap" rel="stylesheet">

    <script src="../static/script.js" defer></script>
</head>

<body onload="addYear()">
    <div class="container">
        <header class="header">
            <img id="logo" src="../static/monomuselogo.png" alt="MonoMuse Museum Logo">
        </header>

        <nav class="nav_bar">
            <a href="../index.html">Home</a>
            <div id="navLinks" class="nav_links">
                <a href="explore.html">Explore</a>
                <a href="exhibitions.html">Exhibitions</a>
                <a href="tickets.html">Tickets</a>
                <a href="membership.html">Membership</a>
                <a id="navselected" href="checkout.html">Checkout</a>
            </div>
            <button type="button" class="nav_hamburger" aria-label="Toggle navigation menu" aria-expanded="false">&#9776;</button>
        </nav>

        <main class="main">
            <form>
                <label>Name (required)</label><br>
                <input type="text" required><br><br>

                <label>Email (required)</label><br>
                <input type="email" required><br><br>

                <label>Ticket Quantity (required)</label><br>
                <input type="number" min="1" required><br><br>

                <input type="submit" value="Submit">
            </form>
        </main>
        <figure class="main_img"></figure>
        <footer class="footer">
            <p id="copyYear"></p>
        </footer>
    </div>
</body>
</html>
